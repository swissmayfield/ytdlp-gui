name: CI

# Manual trigger only, because GitHub Actions is currently disabled on this
# account. To run automatically again, restore the push / pull_request triggers:
#   on:
#     push:
#       branches: [main]
#     pull_request:
on:
  workflow_dispatch:

jobs:
  test:
    # Windows so tkinter is available (the app targets Windows).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

      - name: Security scan (bandit)
        run: bandit -r ytdlp_gui.py build.py --skip B404,B603,B606,B607,B110

      - name: Dependency audit (pip-audit)
        # Informational: surfaces advisories without failing the build on
        # upstream issues that may have no fix yet.
        continue-on-error: true
        run: pip-audit
